syntax = "proto3";
package quantumchain.quantumchain.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "quantum-chain/x/quantumchain/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "quantumchain/x/quantumchain/Params";
  option (gogoproto.equal) = true;
}
