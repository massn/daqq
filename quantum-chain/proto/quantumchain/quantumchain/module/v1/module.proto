syntax = "proto3";
package quantumchain.quantumchain.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "quantum-chain/x/quantumchain/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "quantum-chain/x/quantumchain"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
