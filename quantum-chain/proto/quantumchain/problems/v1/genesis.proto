syntax = "proto3";
package quantumchain.problems.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "quantumchain/problems/v1/params.proto";
import "quantumchain/problems/v1/types.proto";

option go_package = "quantum-chain/x/problems/types";

// GenesisState defines the problems module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];

  // problems is the initial set of registered problems. Used by problem
  // modules that opt to seed their own entry at chain genesis.
  repeated Problem problems = 2 [(gogoproto.nullable) = false];
}
