syntax = "proto3";
package quantumchain.problems.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "quantum-chain/x/problems/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "quantumchain/x/problems/Params";
  option (gogoproto.equal) = true;

  // next_problem_id is the ID that will be assigned to the next problem
  // registered through Register(). IDs are monotonically increasing and are
  // never reused even after a problem is disabled.
  uint64 next_problem_id = 1;
}
