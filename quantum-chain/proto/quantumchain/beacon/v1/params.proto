syntax = "proto3";
package quantumchain.beacon.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "quantum-chain/x/beacon/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "quantumchain/x/beacon/Params";
  option (gogoproto.equal) = true;
}
